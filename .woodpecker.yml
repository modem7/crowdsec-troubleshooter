when:
  - event: [push, manual]
    branch: master
    path:
      # Scoped to what actually gets COPYed into the image in the Dockerfile —
      # not "Dockerfile, scripts/**" from the template, since this repo's
      # layout is different. Deliberately excludes tests/, examples/,
      # docs, .github/ — none of that affects image content, so no point
      # rebuilding/republishing on a doc-only or CI-only change.
      include:
        - Dockerfile
        - lib/**
        - checks/**
        - setup/**
        - versioncheck/**
        - capability_check.sh
        - troubleshoot.sh
        - .woodpecker.yml

# Single image, no resolution-variant matrix needed (unlike docker-rickroll,
# which builds 4 separate tagged variants from the same Dockerfile pointed
# at different video assets) — this is one straightforward multi-arch build.
steps:
  - name: lint-dockerfile
    image: hadolint/hadolint:latest-alpine
    commands:
      - hadolint --version
      - hadolint Dockerfile

  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [lint-dockerfile]
    settings:
      repo: ${CI_REPO}
      dockerfile: Dockerfile
      purge: true
      compress: true
      build_args:
        BUILDKIT_INLINE_CACHE: "1"
      cache_from:
        - type=registry\,ref=${CI_REPO}:latest
      platforms: linux/amd64,linux/arm64/v8
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags: latest

  # UNVERIFIED — proposed by analogy with the GitHub Actions side (see
  # publish-ghcr.yml), but I can't actually test Woodpecker's DinD mechanics
  # the way I verified the GitHub Actions runner behavior. The privileged
  # flag matches build-and-push above, but whether a plain `docker` image
  # gets working docker-cli access this way on your instance specifically
  # needs confirming — check this actually runs before relying on it.
  - name: verify-published-image
    image: docker
    privileged: true
    depends_on: [build-and-push]
    commands:
      - docker pull ${CI_REPO}:latest
      - docker buildx imagetools inspect ${CI_REPO}:latest | tee /tmp/manifest.txt
      - grep -q "linux/amd64" /tmp/manifest.txt
      - grep -q "linux/arm64" /tmp/manifest.txt
      - |
        set +e
        output=$(docker run --rm ${CI_REPO}:latest 2>&1)
        code=$?
        set -e
        echo "$output"
        [ "$code" -ne 0 ] || (echo "expected non-zero exit with no CROWDSEC_LAPI_URL" && exit 1)
        echo "$output" | grep -q "CROWDSEC_LAPI_URL is not set" || (echo "missing expected error in PUBLISHED image" && exit 1)

  - name: pushrm-dockerhub
    image: chko/docker-pushrm
    depends_on:
      - build-and-push
    environment:
      DOCKER_USER:
        from_secret: docker_username
      DOCKER_PASS:
        from_secret: docker_password
      PUSHRM_FILE: README.md
      PUSHRM_SHORT: "Unprivileged, run-once Docker tool for diagnosing CrowdSec + Traefik setups"
      PUSHRM_TARGET: ${CI_REPO}
    when:
      - status: [success]

  # Same fork/build of GowerStreet/woodpecker-slack as the rickroll pipeline
  # (see github.com/GowerStreet/woodpecker-slack/issues/7) — status still
  # set explicitly per step since Woodpecker doesn't expose
  # CI_PIPELINE_STATUS as a container env var (woodpecker-ci/woodpecker#4337).
  - name: notify-slack-success
    image: ghcr.io/modem7/woodpecker-slack:latest
    pull: true
    depends_on:
      - build-and-push
    settings:
      status: success
      description: crowdsec-troubleshooter build
      webhook:
        from_secret: slack_hook
    when:
      - status: [success]

  - name: notify-slack-failure
    image: ghcr.io/modem7/woodpecker-slack:latest
    pull: true
    depends_on:
      - build-and-push
    settings:
      status: failure
      description: crowdsec-troubleshooter build
      webhook:
        from_secret: slack_hook
    when:
      - status: [failure]