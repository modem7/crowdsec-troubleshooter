when:
  - event: [push, manual]
    branch: master
    path:
      # Scoped to what actually gets COPYed into the image in the Dockerfile —
      # not "Dockerfile, scripts/**" from the template, since this repo's
      # layout is different. Deliberately excludes tests/, examples/,
      # docs, .github/ — none of that affects image content, so no point
      # rebuilding/republishing on a doc-only or CI-only change.
      include:
        - Dockerfile
        - lib/**
        - checks/**
        - setup/**
        - versioncheck/**
        - capability_check.sh
        - troubleshoot.sh
        - .woodpecker.yml

# Single image, no resolution-variant matrix needed (unlike docker-rickroll,
# which builds 4 separate tagged variants from the same Dockerfile pointed
# at different video assets) — this is one straightforward multi-arch build.
steps:
  - name: lint-dockerfile
    image: hadolint/hadolint:latest-alpine
    commands:
      - hadolint --version
      - hadolint Dockerfile

  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [lint-dockerfile]
    settings:
      repo: ${CI_REPO}
      dockerfile: Dockerfile
      purge: true
      compress: true
      build_args:
        BUILDKIT_INLINE_CACHE: "1"
        # Bakes the actual commit SHA into the image (see Dockerfile) so
        # check_image_freshness.sh has something real to compare against
        # GitHub's latest master commit, instead of guessing.
        GIT_SHA: ${CI_COMMIT_SHA}
      cache_from:
        - type=registry\,ref=${CI_REPO}:latest
      platforms: linux/amd64,linux/arm64/v8
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      tags: latest

  - name: pushrm-dockerhub
    image: chko/docker-pushrm
    depends_on:
      - build-and-push
    environment:
      DOCKER_USER:
        from_secret: docker_username
      DOCKER_PASS:
        from_secret: docker_password
      PUSHRM_FILE: README.md
      PUSHRM_SHORT: "Unprivileged, run-once Docker tool for diagnosing CrowdSec + Traefik setups"
      PUSHRM_TARGET: ${CI_REPO}
    when:
      - status: [success]

  # Single dynamic-status notifier, replacing notify-slack-success/failure.
  # CI_PIPELINE_STATUS must stay bare ($VAR, not ${VAR}) - Woodpecker
  # resolves ${VAR} at compile time, before this value exists
  # (woodpecker-ci/woodpecker#6826).
  - name: notify-slack
    image: alpine
    depends_on:
      - build-and-push
    environment:
      SLACK_WEBHOOK:
        from_secret: slack_hook
    commands:
      - apk add --no-cache curl jq >/dev/null
      - COMMIT_SHORT=$(echo "$CI_COMMIT_SHA" | cut -c1-10)
      - >
        PAYLOAD=$(jq -n
        --arg status "$CI_PIPELINE_STATUS"
        --arg branch "$CI_COMMIT_BRANCH"
        --arg output "${CI_REPO}#${CI_PIPELINE_NUMBER}"
        --arg output_url "$CI_PIPELINE_URL"
        --arg build "$CI_PIPELINE_NUMBER"
        --arg commit "$COMMIT_SHORT"
        --arg commit_url "$CI_PIPELINE_FORGE_URL"
        --arg author "$CI_COMMIT_AUTHOR"
        --arg message "$CI_COMMIT_MESSAGE"
        '{attachments:[{color:(if $status == "success" then "good" else "danger" end),fields:[
        {title:"Status",value:$status,short:true},
        {title:"Branch",value:$branch,short:true},
        {title:"Output",value:("<"+$output_url+"|"+$output+">"),short:true},
        {title:"Build Number",value:$build,short:true},
        {title:"Commit",value:("<"+$commit_url+"|"+$commit+">"),short:true},
        {title:"Author",value:$author,short:true},
        {title:"Commit Message",value:$message,short:false}
        ]}]}')
      - >
        curl -fsS -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK"
    when:
      - status: [success, failure]