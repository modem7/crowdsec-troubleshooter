# https://github.com/apps/settings
# https://github.com/repository-settings/app

_extends: .github
repository:
  name: crowdsec-troubleshooter
  description: >-
    Unprivileged, run-once Docker tool for diagnosing CrowdSec + Traefik
    setups — a wellness check, an IP block checker, and an optional live
    "does blocking actually work" test. No daemon, no docker.sock, no host
    networking, no capabilities required.
  homepage: https://hub.docker.com/repository/docker/modem7/crowdsec-troubleshooter
  topics: crowdsec, traefik, docker, docker-compose, security, homelab, self-hosted, bash, shellcheck, cybersecurity
  private: false
  has_issues: true
  has_wiki: false
  has_downloads: true
  has_projects: false
  has_discussions: false
  default_branch: master
  allow_squash_merge: true
  allow_rebase_merge: true
  allow_merge_commit: true
  # Auto-delete head branches after merge
  delete_branch_on_merge: true
  # Always suggest updating PR branches that are behind base
  allow_update_branch: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true
  # Labels are managed by .github/config/labels.yml + the labelsync workflow
