name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same branch/PR rather than letting them pile up
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------
  # Fast, cheap checks first — fail quickly on the easy stuff before
  # spending time on the Docker build.
  # ---------------------------------------------------------------------

  syntax-check:
    name: bash -n (syntax)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check every script parses
        run: |
          fail=0
          for f in $(find . -name "*.sh"); do
            if ! bash -n "$f"; then
              echo "::error file=$f::Syntax error"
              fail=1
            fi
          done
          exit $fail

  executable-bits:
    name: Executable bits + convention checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Every .sh file must be executable
        run: |
          fail=0
          for f in $(find . -name "*.sh"); do
            if [[ ! -x "$f" ]]; then
              echo "::error file=$f::Not executable — run chmod +x"
              fail=1
            fi
          done
          exit $fail
      - name: Every check script must set -uo pipefail (project convention)
        run: |
          fail=0
          for f in checks/*/*.sh capability_check.sh troubleshoot.sh lib/*.sh; do
            [[ -f "$f" ]] || continue
            if ! grep -q "set -uo pipefail" "$f"; then
              echo "::error file=$f::Missing 'set -uo pipefail' — this is a repo-wide convention, see CLAUDE.md"
              fail=1
            fi
          done
          exit $fail
      - name: Every setup/add_*.sh must have a matching remove_*.sh (see CLAUDE.md)
        run: |
          fail=0
          for f in setup/add_*.sh; do
            [[ -f "$f" ]] || continue
            expected="setup/remove_${f#setup/add_}"
            if [[ ! -f "$expected" ]]; then
              echo "::error file=$f::No matching removal script found at $expected"
              fail=1
            fi
          done
          for f in setup/register_*.sh; do
            [[ -f "$f" ]] || continue
            expected="setup/unregister_${f#setup/register_}"
            if [[ ! -f "$expected" ]]; then
              echo "::error file=$f::No matching removal script found at $expected"
              fail=1
            fi
          done
          exit $fail

      - name: Every 'trap ... EXIT' must also explicitly trap SIGTERM/SIGINT (PID-1 signal semantics — see DESIGN.md)
        run: |
          fail=0
          for f in $(grep -rl "^trap .* EXIT" --include="*.sh" .); do
            if ! grep -qE "^trap .*EXIT.*SIGTERM" "$f"; then
              echo "::error file=$f::trap on EXIT without explicit SIGTERM/SIGINT — see DESIGN.md 'Why no init system'"
              fail=1
            fi
          done
          exit $fail

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          # .shellcheckrc at repo root sets external-sources=true so the
          # `# shellcheck source=` directives above every dynamic `source
          # "$(dirname ...)/lib/common.sh"` line actually get followed
          # instead of just producing SC1091 noise.

  hadolint:
    name: Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jbergstroem/hadolint-gh-action@v1
        with:
          dockerfile: Dockerfile

  compose-yaml-validity:
    name: Validate example compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Parse every example compose file as YAML
        run: |
          pip install --quiet pyyaml
          fail=0
          for f in examples/*.yml; do
            if ! python3 -c "import yaml; yaml.safe_load(open('$f'))"; then
              echo "::error file=$f::Invalid YAML"
              fail=1
            fi
          done
          exit $fail
      - name: Validate with docker compose config (catches schema errors YAML parsing alone won't)
        run: |
          fail=0
          for f in examples/*.yml; do
            if ! docker compose -f "$f" config -q 2>/tmp/err; then
              echo "::error file=$f::$(cat /tmp/err)"
              fail=1
            fi
          done
          exit $fail

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE only required for GitHub Organizations, not personal accounts

  # ---------------------------------------------------------------------
  # Behavioral tests — the regression suite. This is where the two real
  # bugs found during manual development are now permanently covered:
  # see tests/lib_common.bats and tests/check_metrics_liveness.bats.
  # ---------------------------------------------------------------------

  bats-tests:
    name: bats (regression + behavior tests)
    runs-on: ubuntu-latest
    needs: [syntax-check]  # no point running behavior tests on code that doesn't parse
    steps:
      - uses: actions/checkout@v7
      - name: Install bats
        run: sudo apt-get update -qq && sudo apt-get install -y bats jq
      - name: Run test suite
        run: bats tests/*.bats --timing

  # ---------------------------------------------------------------------
  # Build last — most expensive, most likely to catch packaging issues
  # (broken COPY paths, missing chmod, etc.) that unit tests can't see.
  # ---------------------------------------------------------------------

  docker-build:
    name: Docker build + smoke test
    runs-on: ubuntu-latest
    needs: [syntax-check, shellcheck, bats-tests]
    # security-events:write is needed only for the SARIF upload step below —
    # everything else in this job needs nothing beyond the default read access.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      - name: Build image
        run: docker build -t crowdsec-troubleshooter:ci .

      # New now that a real published image exists: hadolint only lints the
      # Dockerfile's *practices*, it has never actually looked at what CVEs
      # ship inside alpine:3.24 + bash/curl/jq. Scanning here, before either
      # registry publish can happen (publish-ghcr.yml is gated on this whole
      # workflow succeeding), means a genuinely bad image never gets shipped
      # rather than being caught after the fact.
      - name: Save image for vulnerability scanning
        run: docker save -o /tmp/image.tar crowdsec-troubleshooter:ci
      - name: Scan image for known vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: /tmp/image.tar
          format: sarif
          output: trivy-results.sarif
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          # Only fail on vulnerabilities that actually have a fix available —
          # failing CI over a disclosed-but-unpatched upstream CVE would be
          # unactionable, not protective.
          ignore-unfixed: true
      - name: Upload scan results to the Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Smoke test — missing CROWDSEC_LAPI_URL should fail cleanly, not crash
        run: |
          set +e
          output=$(docker run --rm crowdsec-troubleshooter:ci 2>&1)
          code=$?
          set -e
          echo "$output"
          [[ $code -ne 0 ]] || { echo "::error::Expected non-zero exit with no CROWDSEC_LAPI_URL set"; exit 1; }
          [[ "$output" == *"CROWDSEC_LAPI_URL is not set"* ]] || { echo "::error::Missing expected error message"; exit 1; }
      - name: Smoke test — tier0 runs against a mock LAPI without crashing
        run: |
          docker run -d --name mock-lapi -p 18080:8080 python:3.12-alpine \
            python3 -c "
          import http.server
          class H(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  self.send_response(200); self.end_headers()
              def log_message(self, *a): pass
          http.server.HTTPServer(('0.0.0.0', 8080), H).serve_forever()
          "
          sleep 2
          docker run --rm --link mock-lapi -e CROWDSEC_LAPI_URL=http://mock-lapi:8080 \
            crowdsec-troubleshooter:ci --tier 0 || true
          docker rm -f mock-lapi
      - name: Confirm image runs as a one-shot, not a daemon
        run: |
          # The container should exit on its own with no LAPI configured,
          # not hang waiting for something. If this step times out, that's
          # a regression toward daemon-like behavior, which this project
          # explicitly rejects — see DESIGN.md.
          timeout 10 docker run --rm crowdsec-troubleshooter:ci || true