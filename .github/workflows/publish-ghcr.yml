name: Publish to GHCR

# Deliberately workflow_run rather than its own push trigger — this only
# fires after ci.yml has actually completed on master, and only proceeds if
# it succeeded. That's a guarantee a duplicate `on: push` trigger wouldn't
# give: an image can't get published without CI passing for that exact
# commit, regardless of whether master got there via a PR merge or a direct
# push (both trigger ci.yml the same way).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

# Scoped to exactly what this workflow needs — packages:write for GHCR,
# nothing else. Every other workflow in this repo stays read-only by
# default; see the label-manager permissions fix for why this matters.
permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/modem7/crowdsec-troubleshooter:latest
            ghcr.io/modem7/crowdsec-troubleshooter:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Everything below tests the actual published artifact, not a locally
      # built copy — only possible now that there's something real to pull.
      # Closes a real gap: ci.yml's docker-build job proves the source
      # builds correctly, but nothing previously verified that what lands
      # on a registry after a real push is the same thing and actually works.

      - name: Verify multi-arch manifest actually contains both platforms
        run: |
          docker buildx imagetools inspect ghcr.io/modem7/crowdsec-troubleshooter:latest | tee /tmp/manifest.txt
          grep -q "linux/amd64" /tmp/manifest.txt || { echo "::error::amd64 missing from published manifest"; exit 1; }
          grep -q "linux/arm64" /tmp/manifest.txt || { echo "::error::arm64 missing from published manifest"; exit 1; }

      - name: Pull the just-published image fresh and verify it runs
        run: |
          docker pull ghcr.io/modem7/crowdsec-troubleshooter:${{ github.event.workflow_run.head_sha }}
          set +e
          output=$(docker run --rm ghcr.io/modem7/crowdsec-troubleshooter:${{ github.event.workflow_run.head_sha }} 2>&1)
          code=$?
          set -e
          echo "$output"
          [[ $code -ne 0 ]] || { echo "::error::Expected non-zero exit with no CROWDSEC_LAPI_URL set"; exit 1; }
          [[ "$output" == *"CROWDSEC_LAPI_URL is not set"* ]] || { echo "::error::Missing expected error message in the PUBLISHED image"; exit 1; }