name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
assignees: ["modem7"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, version, relevant tooling
      placeholder: |
        OS: Ubuntu 24.04
        Version: 1.2.3
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / additional context
      description: Any relevant logs, screenshots, or extra info
      render: shell
    validations:
      required: false
